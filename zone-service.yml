server:
  port: 8081

spring:
  application:
    name: zone-service

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/gms_zone_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: binu12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# Feign Client Configuration (Optional: Increases timeout for the External IoT API)
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000